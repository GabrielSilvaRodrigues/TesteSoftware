<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soma</title>
</head>
<body>
    <input type="number" id="num1">
    <input type="number" id="num2">
    <input type="number" id="num3">
    <input type="number" id="num4">
    <input type="number" id="num5">
    <input type="number" id="num6">
    <button id="somar">Somar</button>
    <div id="resultado"></div>

    <script>
        document.getElementById("somar").addEventListener("click", function() {
            var num1 = parseInt(document.getElementById("num1").value);
            var num2 = parseInt(document.getElementById("num2").value);
            var num3 = parseInt(document.getElementById("num3").value);
            var num4 = parseInt(document.getElementById("num4").value);
            var num5 = parseInt(document.getElementById("num5").value);
            var num6 = parseInt(document.getElementById("num6").value);
            document.getElementById("resultado").textContent = num1 + num2 + num3 + num4 + num5 + num6;
        });
    </script>
</body>
</html>
