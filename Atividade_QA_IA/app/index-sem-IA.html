<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PRECISA-SE - Postar Anúncio (Sistema Legado)</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #mensagem-feedback { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>PRECISA-SE - Postar Anúncio</h2>
    <p><i>Sistema de Moderação Tradicional (Filtro de Palavras-Chave)</i></p>
    
    <textarea id="texto-anuncio" placeholder="O que te ajudaria hoje?" style="width: 300px; height: 80px;"></textarea><br>
    <button id="btn-publicar">Publicar Anúncio</button>
    
    <p id="mensagem-feedback"></p>

    <script>
        document.getElementById('btn-publicar').onclick = function() {
            const texto = document.getElementById('texto-anuncio').value.toLowerCase();
            const feedback = document.getElementById('mensagem-feedback');
            
            // Lógica TRADICIONAL (Filtro por Palavras Proibidas)
            // Agora focada em proteção à fauna silvestre conforme o novo BDD
            if (texto.includes("arara") || texto.includes("papagaio") || texto.includes("silvestre")) {
                feedback.innerText = "Conteúdo Bloqueado: Comercialização de animais silvestres é proibida.";
                feedback.style.color = "red";
            } else {
                feedback.innerText = "Anúncio publicado com sucesso!";
                feedback.style.color = "green";
            }
        };
    </script>
</body>
</html>
